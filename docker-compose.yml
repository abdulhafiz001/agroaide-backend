# Local verification only — Coolify does not use this file in production.
# Usage:
#   docker compose up --build
#   curl http://localhost:8080/up

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      APP_NAME: AgroAide
      APP_ENV: local
      APP_KEY: base64:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      LOG_CHANNEL: stderr
      LOG_LEVEL: debug

      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: agroaide
      DB_USERNAME: agroaide
      DB_PASSWORD: secret

      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      BROADCAST_CONNECTION: log
      FILESYSTEM_DISK: local

      CORS_ALLOWED_ORIGINS: "*"

      # Optional integrations (leave empty for boot test)
      GITHUB_MODELS_API_KEY: ""
      LOCATIONIQ_API_KEY: ""
      GROQ_API_KEY: ""
      PLANTNET_API_KEY: ""
      FCM_PROJECT_ID: ""
      FCM_CREDENTIALS_PATH: ""
    volumes:
      # Persist uploaded farm scans between restarts
      - app_storage:/var/www/html/storage/app
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: agroaide
      MYSQL_USER: agroaide
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

volumes:
  mysql_data:
  app_storage:
